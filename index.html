<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>MVP Museo AR - Vaso personalizzato</title>
  <link rel="stylesheet" href="./src/styles.css">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>
<body>
  <div id="ui">
    <h1>Laboratorio AR - Vaso</h1>
    <p>Inquadra il marker HIRO e poi acquisisci il nome.</p>
    <p id="status">Stato: inizializzazione...</p>
  </div>
  <div id="controlsDock" class="controls">
    <button id="startCaptureBtn" type="button">Acquisisci nome</button>
    <button id="applyBtn" type="button" disabled>Applica nome al vaso</button>
    <button id="saveBtn" type="button" disabled>Salva foto</button>
  </div>

  <div id="captureModal" class="modal hidden">
    <div class="modalContent">
      <h2>Acquisizione nome</h2>
      <p>Allinea il nome scritto a mano dentro la cornice e scatta.</p>
      <div class="captureStage">
        <video id="captureVideo" autoplay playsinline muted></video>
        <div id="captureFrame" class="captureFrame">
          <span>Allinea qui il nome</span>
        </div>
      </div>
      <div class="controls">
        <button id="snapBtn" type="button">Scatta</button>
        <button id="closeCaptureBtn" type="button">Chiudi</button>
      </div>
    </div>
  </div>

  <canvas id="vaseTextureCanvas" width="1024" height="1024" class="hidden"></canvas>
  <canvas id="drawingCanvas" width="1024" height="1024" class="hidden"></canvas>
  <canvas id="processedCanvas" width="1024" height="1024" class="hidden"></canvas>

  <a-scene
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    vr-mode-ui="enabled: false"
    arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; sourceWidth: 1280; sourceHeight: 720; debugUIEnabled: false;"
  >
    <a-marker preset="hiro">
      <a-plane
        id="vasePlane"
        position="0 0.8 0"
        rotation="-90 0 0"
        width="1.4"
        height="1.0"
        material="side: double; transparent: true;"
      ></a-plane>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
